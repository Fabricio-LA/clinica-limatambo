<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administración - Clínica Limatambo</title>
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/css/estilos-clinica.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        .sidebar { background-color: #212529; min-height: calc(100vh - 76px); }
        .nav-link { color: rgba(255,255,255,.5); }
        .nav-link.active { color: #fff; background: rgba(255,255,255,.1); }
    </style>
</head>

<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark border-bottom sticky-top">
    <div class="container-fluid mx-4">
        <a class="navbar-brand d-flex align-items-center" th:href="@{/}">
            <span class="fw-bold text-success">LIMATAMBO ADMIN</span>
        </a>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto align-items-center">
                <li class="nav-item text-light me-4">Admin: <span sec:authentication="name">admin@clinica.pe</span></li>
                <li class="nav-item">
                    <form th:action="@{/logout}" method="post">
                        <button type="submit" class="btn btn-danger btn-sm px-4">Salir</button>
                    </form>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container-fluid">
    <div class="row">
        <nav class="col-md-3 col-lg-2 d-md-block sidebar collapse p-0">
            <div class="position-sticky pt-3">
                <ul class="nav flex-column px-3">
                    <li class="nav-item mb-2">
                        <a class="nav-link active rounded" href="#"><i class="bi bi-calendar-event me-2"></i> Citas</a>
                    </li>
                    <li class="nav-item mb-2">
                        <a class="nav-link" href="#"><i class="bi bi-people me-2"></i> Médicos</a>
                    </li>
                </ul>
            </div>
        </nav>

        <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 pt-4">
            <div class="d-flex justify-content-between align-items-center pb-2 mb-3 border-bottom">
                <h1 class="h2 fw-bold">Panel de Administración</h1>
            </div>

            <div class="row g-4 mb-5">
                <div class="col-md-3">
                    <div class="card border-0 border-start border-4 border-success shadow-sm p-3">
                        <h6 class="text-muted small">Citas Hoy</h6>
                        <h3 class="fw-bold">24</h3>
                    </div>
                </div>
            </div>

            <div class="card border-0 shadow-sm p-3 mb-5">
                <h5 class="fw-bold mb-4">Tabla de Gestión</h5>
                <div class="table-responsive">
                    <table class="table table-striped align-middle">
                        <thead>
                            <tr>
                                <th>Hora</th>
                                <th>Paciente</th>
                                <th>Estado</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td>09:00</td>
                                <td>María González</td>
                                <td><span class="badge bg-success">Confirmada</span></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
</div>

<script th:src="@{/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
