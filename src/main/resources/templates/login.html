<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Clínica Limatambo</title>

    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/css/estilos-clinica.css}">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body class="login-body">

    <div class="login-card">
        <div class="logo-login">
            <i class="bi bi-hospital-fill me-2" style="color: var(--matcha-main);"></i>
            LIMATAMBO
        </div>
        
        <h5 class="text-center mb-4 fw-bold">Bienvenido al Sistema</h5>

        <div th:if="${param.error}" class="alert alert-danger py-2 small text-center">
            Usuario o contraseña incorrectos.
        </div>

        <form th:action="@{/login}" method="post">
            <div class="mb-3">
                <label class="form-label small fw-bold">Usuario (DNI)</label>
                <div class="input-group">
                    <span class="input-group-text bg-light border-0"><i class="bi bi-person"></i></span>
                    <input type="text" name="username" class="form-control bg-light border-0" placeholder="Ingrese su DNI" required>
                </div>
            </div>
            
            <div class="mb-4">
                <label class="form-label small fw-bold">Contraseña</label>
                <div class="input-group">
                    <span class="input-group-text bg-light border-0"><i class="bi bi-lock"></i></span>
                    <input type="password" name="password" class="form-control bg-light border-0" placeholder="********" required>
                </div>
            </div>

            <button type="submit" class="btn btn-reservar w-100 mb-3">INGRESAR</button>
            
            <div class="text-center">
                <a th:href="@{/}" class="text-decoration-none small text-muted">
                    <i class="bi bi-arrow-left me-1"></i> Volver al inicio
                </a>
            </div>
        </form>
    </div>

</body>
</html>
